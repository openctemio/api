# =============================================================================
# Asset Relationship Type Registry — Single Source of Truth
# =============================================================================
#
# This file is the canonical definition of every asset relationship type
# the platform supports. The Go enum, TypeScript union, label maps, and
# constraint maps are GENERATED from this file by:
#
#     cd api && go run ./cmd/gen-relationships
#
# Workflow when adding a new relationship type:
#   1. Edit this file (add an entry under `types`)
#   2. Run `make generate-relationships` (or the go run command above)
#   3. Commit this file + the generated .go and .ts files together
#
# DO NOT edit the generated files directly — they will be overwritten.
#
# Why YAML and not Go/TS code as the source: a single declarative
# config means new types can't drift between languages, and a future
# version of the codegen could emit Python / OpenAPI / etc. without
# touching this file.
# =============================================================================

# Categories used to organise types in the UI dropdown.
# Display order is the order they appear here.
categories:
  - id: attack_surface_mapping
    name: Attack Surface Mapping
  - id: attack_path_analysis
    name: Attack Path Analysis
  - id: control_and_ownership
    name: Control & Ownership

# Relationship types.
#
# Fields:
#   id           — snake_case identifier (used as the DB column value
#                  and the TS literal type). NEVER rename without a
#                  data migration.
#   category     — must match an entry in `categories` above.
#   direct       — verb phrase from the source's perspective ("Runs On")
#   inverse      — verb phrase from the target's perspective ("Runs")
#   description  — sentence describing semantics + when to use it.
#                  Shown in the Add Relationship dialog so users know
#                  which type to pick.
#   constraints  — list of (sourceTypes, targetTypes) tuples. The UI
#                  uses this to filter the picker; the backend uses it
#                  for additional validation. Each tuple defines ONE
#                  valid combination — the union of all tuples is the
#                  full set of valid pairs for that relationship type.
#                  Asset type IDs must match the ExtendedAssetType union.

types:

  # ---- Attack Surface Mapping --------------------------------------------

  - id: runs_on
    category: attack_surface_mapping
    direct: Runs On
    inverse: Runs
    description: >-
      Runtime location of a workload — service/container/website is
      currently executing on this compute. Use this for "where it lives
      now". For build/deploy events use Deployed To.
    constraints:
      - sources: [service, api, website]
        targets: [host, container, k8s_workload, cloud_account]
      - sources: [database]
        targets: [host, container, cloud_account]
      - sources: [k8s_workload]
        targets: [k8s_cluster]
      - sources: [container]
        targets: [host, k8s_workload]

  - id: deployed_to
    category: attack_surface_mapping
    direct: Deployed To
    inverse: Has Deployment
    description: >-
      Build artifact placed at a target — strictly for repos / container
      images / build outputs. Do NOT use this for runtime workloads
      (those use Runs On).
    constraints:
      - sources: [repository, container_image]
        targets: [k8s_cluster, k8s_workload, cloud_account, host]

  - id: contains
    category: attack_surface_mapping
    direct: Contains
    inverse: Contained By
    description: >-
      Hierarchical parent-child relationship (org → app → service;
      cluster → namespace).
    constraints:
      - sources: [k8s_cluster]
        targets: [k8s_workload]
      - sources: [api_collection, api]
        targets: [api_endpoint]
      - sources: [host]
        targets: [container, service, database]
      - sources: [repository]
        targets: [container_image]
      - sources: [network]
        targets: [host, cloud_account, load_balancer]
      - sources: [cloud_account]
        targets: [host, database, k8s_cluster, network, storage, serverless]

  - id: exposes
    category: attack_surface_mapping
    direct: Exposes
    inverse: Exposed By
    description: >-
      Asset exposes an access surface (api/service → port/endpoint/public
      interface).
    constraints:
      - sources: [host, k8s_workload, container]
        targets: [api_endpoint, service, api]
      - sources: [domain]
        targets: [website, api, service]
      - sources: [load_balancer]
        targets: [api, service, website]

  - id: member_of
    category: attack_surface_mapping
    direct: Member Of
    inverse: Has Member
    description: >-
      Membership in a group or collection (user → group; host → cluster;
      namespace → cluster).
    constraints:
      - sources: [host, container, k8s_workload]
        targets: [k8s_cluster, network]
      - sources: [service, api]
        targets: [network]

  - id: resolves_to
    category: attack_surface_mapping
    direct: Resolves To
    inverse: Resolved By
    description: DNS resolution (domain/subdomain → IP/CDN/load balancer).
    constraints:
      - sources: [domain]
        targets: [ip_address, load_balancer, cloud_account, host]

  # ---- Attack Path Analysis ----------------------------------------------

  - id: depends_on
    category: attack_path_analysis
    direct: Depends On
    inverse: Used By
    description: A needs B to function (service → database; web_app → api).
    constraints:
      - sources: [service, api, website]
        targets: [database, api, service, credential]
      - sources: [k8s_workload]
        targets: [container_image, database, api, service]
      - sources: [mobile]
        targets: [api, service]

  - id: sends_data_to
    category: attack_path_analysis
    direct: Sends Data To
    inverse: Receives Data From
    description: Data flow in-transit (service → service; producer → queue).
    constraints:
      - sources: [service, api, website, mobile]
        targets: [database, api, service, cloud_account]
      - sources: [database]
        targets: [database]  # replication

  - id: stores_data_in
    category: attack_path_analysis
    direct: Stores Data In
    inverse: Stores Data For
    description: Data at-rest (service/app → database/bucket/data store).
    constraints:
      - sources: [service, api, website]
        targets: [database, storage, cloud_account]
      - sources: [k8s_workload]
        targets: [database, storage]

  - id: authenticates_to
    category: attack_path_analysis
    direct: Authenticates To
    inverse: Authenticates
    description: Authentication relationship (user/service → IdP/app/api).
    constraints:
      - sources: [api, service, website, mobile]
        targets: [identity_provider, service, api]
      - sources: [k8s_workload]
        targets: [identity_provider, service]

  - id: granted_to
    category: attack_path_analysis
    direct: Granted To
    inverse: Has Grant
    description: IAM privilege (role/policy → principal/resource).
    constraints:
      - sources: [credential, service]
        targets: [cloud_account, database, api, service, k8s_cluster]

  - id: load_balances
    category: attack_path_analysis
    direct: Load Balances
    inverse: Load Balanced By
    description: Traffic distribution (load_balancer → service/web_app).
    constraints:
      - sources: [load_balancer, service, cloud_account]
        targets: [host, k8s_workload, service, container]

  # ---- Control & Ownership ----------------------------------------------

  - id: protected_by
    category: control_and_ownership
    direct: Protected By
    inverse: Protects
    description: Security control (web_app → WAF; host → EDR; cloud → CSPM).
    constraints:
      - sources: [website, api, service]
        targets: [load_balancer, service]   # WAF, CDN as load_balancer/service
      - sources: [host, compute]
        targets: [service]                  # EDR, AV as service
      - sources: [cloud_account]
        targets: [service]                  # CSPM, GuardDuty as service

  - id: monitors
    category: control_and_ownership
    direct: Monitors
    inverse: Monitored By
    description: Observability (SIEM/EDR/APM → asset).
    constraints:
      - sources: [service]                  # SIEM, EDR, APM as service
        targets: [host, k8s_cluster, cloud_account, api, service, database, network]

  - id: manages
    category: control_and_ownership
    direct: Manages
    inverse: Managed By
    description: Control-plane management (cloud_account/IAM → resource/workload).
    constraints:
      - sources: [cloud_account]
        targets: [host, database, k8s_cluster, network, load_balancer]
      - sources: [k8s_cluster]
        targets: [k8s_workload, container]

  - id: owned_by
    category: control_and_ownership
    direct: Owned By
    inverse: Owns
    description: Accountability (asset → team/owner).
    constraints:
      - sources:
          - domain
          - website
          - service
          - repository
          - cloud_account
          - host
          - database
          - api
          - mobile
          - k8s_cluster
        targets: [service]                  # team/owner represented as service type
